org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation.
# The Kotlin daemon crashes on Windows when plugin sources (pub cache on C:)
# and the project (D:) are on different drives, because the incremental cache
# tries to store cross-drive relative paths which Java/Kotlin forbids.
kotlin.incremental=false
